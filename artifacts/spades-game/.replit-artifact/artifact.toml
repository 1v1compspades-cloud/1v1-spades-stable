kind = "web"
previewPath = "/"
title = "Spades Multiplayer"
version = "1.0.0"
id = "artifacts/spades-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21046

[services.development]
run = "pnpm --filter @workspace/spades-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spades-game", "run", "build" ]
publicDir = "artifacts/spades-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21046"
BASE_PATH = "/"
