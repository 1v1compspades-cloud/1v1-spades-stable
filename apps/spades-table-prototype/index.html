<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spades Master Prototype</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="home-panel" aria-labelledby="home-title">
        <p class="eyebrow">Spades Master</p>
        <h1 id="home-title">1v1 Spades</h1>
        <div class="controls">
          <label>
            Player name
            <input id="display-name" autocomplete="nickname" value="Player">
          </label>
          <button id="create-room" type="button">Create Room</button>
          <label>
            Room code
            <input id="join-code" autocomplete="off" inputmode="text" placeholder="ABC123">
          </label>
          <button id="join-room" type="button">Join Room</button>
          <button id="restore-room" type="button">Restore Active Room</button>
          <button id="clear-room" type="button">Clear Active Room</button>
        </div>
      </section>

      <section class="status-panel" aria-labelledby="status-title">
        <h2 id="status-title">Room Status</h2>
        <div class="qa-status-grid" aria-label="Current text gameplay status">
          <p id="phase-status" class="status-chip">Phase: none</p>
          <p id="seat-status" class="status-chip">Seat: none</p>
          <p id="turn-status" class="status-chip">Turn: none</p>
          <p id="action-status" class="status-chip">Action: none</p>
        </div>
        <pre id="room-status">No active room.</pre>
        <p id="bid-status" class="status-line">Bid next: none</p>
        <pre id="hand-status">Hand IDs: none</pre>
        <p id="playable-status" class="status-line">Playable IDs: none</p>
        <p id="trick-status" class="status-line">Current trick: none</p>
        <pre id="hand-summary">Hand summary: none</pre>
        <pre id="match-history">Match history: none</pre>
        <p id="shell-error" class="error-line" role="status"></p>
        <div class="bid-controls" aria-label="Bidding controls">
          <label>
            Bid
            <input id="bid-input" type="number" min="0" max="13" inputmode="numeric" value="4">
          </label>
          <button id="submit-bid" type="button">Submit Bid for Active Seat</button>
          <button id="submit-nil" type="button">Submit Nil Bid</button>
        </div>
        <div class="room-actions">
          <button id="ready-player" type="button">Mark Active Seat Ready</button>
          <button id="leave-room" type="button">Leave Active Room</button>
        </div>
        <div class="play-controls" aria-label="Text play-card controls">
          <label>
            Card ID
            <input id="play-card-id" autocomplete="off" placeholder="2-clubs">
          </label>
          <button id="submit-play-card" type="button">Play Card ID for Active Seat</button>
          <button id="play-full-hand" type="button">Auto-Play Text Hand</button>
          <button id="start-next-hand" type="button">Start Next Hand from Summary</button>
          <button id="record-match-history" type="button">Record Completed Match</button>
          <button id="start-new-match" type="button">Reset to New Match</button>
        </div>
      </section>

      <section class="manual-panel" aria-labelledby="manual-title">
        <h2 id="manual-title">Local Two-Seat Test</h2>
        <div class="fixture-controls" aria-label="Fixture controls">
          <label>
            View as
            <select id="manual-view">
              <option value="host">Player 1</option>
              <option value="guest">Player 2</option>
              <option value="spectator">Spectator</option>
            </select>
          </label>
          <label>
            Preset
            <select id="fixture-preset"></select>
          </label>
          <button id="run-fixture" type="button">Run Selected Preset</button>
          <button id="reset-fixture" type="button">Reset Clean Local Room</button>
        </div>
        <div class="room-actions">
          <button id="manual-setup" type="button">Setup Host/Guest</button>
          <button id="manual-ready" type="button">Ready Both</button>
          <button id="manual-bid" type="button">Bid Both</button>
          <button id="manual-trick" type="button">Play One Trick</button>
          <button id="manual-full-hand" type="button">Play Full Hand</button>
          <button id="manual-next-hand" type="button">Start Next Hand</button>
        </div>
        <pre id="manual-status">Manual harness idle.</pre>
      </section>
    </main>

    <script type="module" src="./src/home-client.js"></script>
  </body>
</html>
