<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaderboard - 1v1 Euchre</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="master-shell home-shell">
      <button class="info-button" data-info-button type="button" aria-label="Open info">☰ Info</button>

      <section class="master-panel home-master-panel">
        <p class="eyebrow">Leaderboard</p>
        <h1>1v1 Euchre</h1>
        <p class="home-copy">Past match results from completed games.</p>

        <section class="leaderboard-panel" aria-label="Leaderboard standings">
          <h2>Leaderboard</h2>
          <div class="leaderboard-table-wrap">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th scope="col">Rank</th>
                  <th scope="col">Display name</th>
                  <th scope="col">Wins</th>
                  <th scope="col">Losses</th>
                  <th scope="col">Matches played</th>
                  <th scope="col">Win %</th>
                  <th scope="col">Tournament wins</th>
                </tr>
              </thead>
              <tbody id="leaderboardRows">
                <tr>
                  <td colspan="7">Loading standings...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <p id="leaderboardStatus" class="home-status" aria-live="polite"></p>
        </section>

        <nav class="profile-nav" aria-label="Profile navigation">
          <a class="button-link secondary-link" href="./home.html">Home</a>
          <a class="button-link secondary-link" href="./profile.html">Profile</a>
          <a class="button-link secondary-link" href="./tournament-history.html">Tournament History</a>
        </nav>
      </section>
    </main>

    <script type="module" src="./src/leaderboard-client.js"></script>
  </body>
</html>
