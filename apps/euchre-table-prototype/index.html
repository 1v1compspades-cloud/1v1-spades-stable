<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1v1 Euchre Freeplay Table Prototype</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local Prototype</p>
          <h1>1v1 Euchre Table</h1>
        </div>
        <div class="controls">
          <label for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="communityCompetitive">Community Competitive</option>
            <option value="classicCasual">Classic Casual</option>
            <option value="fastGame">Fast Game</option>
            <option value="practiceMode">Practice Mode</option>
          </select>
          <button id="newHandButton" type="button">New Hand</button>
        </div>
      </header>

      <section class="scoreband" aria-label="Match score">
        <div>
          <span>Player 1</span>
          <strong id="player1Score">0</strong>
        </div>
        <div>
          <span>Target</span>
          <strong id="targetScore">10</strong>
        </div>
        <div>
          <span>Player 2</span>
          <strong id="player2Score">0</strong>
        </div>
      </section>

      <section class="status" aria-live="polite">
        <p id="statusText">Start a new hand.</p>
      </section>

      <section class="table-grid">
        <article class="panel player-panel">
          <div class="panel-heading">
            <h2>Player 1 Hand</h2>
            <span id="player1Tricks">0 tricks</span>
          </div>
          <div id="player1Hand" class="hand" aria-label="Player 1 hand"></div>
        </article>

        <article class="panel center-panel">
          <div class="panel-heading">
            <h2>Kitty / Upcard</h2>
            <span id="kittyCount">0 cards</span>
          </div>
          <div id="upcard" class="upcard empty">No hand</div>

          <div id="trumpPanel" class="trump-panel">
            <h3>Select Trump</h3>
            <p id="trumpHelp">Choose trump to begin trick play.</p>
            <div id="trumpButtons" class="trump-buttons"></div>
            <button id="passButton" class="secondary" type="button">Pass</button>
          </div>

          <div class="trick-area">
            <h3>Current Trick</h3>
            <div id="currentTrick" class="current-trick"></div>
          </div>

          <div class="history">
            <h3>Completed Tricks</h3>
            <ol id="trickHistory"></ol>
          </div>
        </article>

        <article class="panel player-panel">
          <div class="panel-heading">
            <h2>Player 2 Hand</h2>
            <span id="player2Tricks">0 tricks</span>
          </div>
          <div id="player2Hand" class="hand" aria-label="Player 2 hand"></div>
        </article>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
