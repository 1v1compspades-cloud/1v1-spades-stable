<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tournament History - 1v1 Euchre</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="master-shell home-shell">
      <button class="info-button" data-info-button type="button" aria-label="Open info">☰ Info</button>

      <section class="master-panel home-master-panel">
        <p class="eyebrow">Tournament History</p>
        <h1>Past Tournaments</h1>
        <p class="home-copy">Completed Euchre tournament summaries.</p>

        <section class="leaderboard-panel" aria-label="Past tournaments">
          <h2>Past Tournaments</h2>
          <div class="leaderboard-table-wrap">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th scope="col">Tournament code</th>
                  <th scope="col">Bracket size</th>
                  <th scope="col">Champion</th>
                  <th scope="col">Runner-up</th>
                  <th scope="col">Completed</th>
                  <th scope="col">Matches</th>
                  <th scope="col">Rounds</th>
                </tr>
              </thead>
              <tbody id="tournamentHistoryRows">
                <tr>
                  <td colspan="7">Loading tournament history...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <p id="tournamentHistoryStatus" class="home-status" aria-live="polite"></p>
        </section>

        <nav class="profile-nav" aria-label="Tournament history navigation">
          <a class="button-link secondary-link" href="./home.html">Home</a>
          <a class="button-link secondary-link" href="./leaderboard.html">Leaderboard</a>
          <a class="button-link secondary-link" href="./profile.html">Profile</a>
        </nav>
      </section>
    </main>

    <script type="module" src="./src/tournament-history-client.js"></script>
  </body>
</html>
